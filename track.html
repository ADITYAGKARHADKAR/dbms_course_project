<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Track Request - Lost & Found Portal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo"><i class="fas fa-magnifying-glass"></i> Lost &amp; Found</div>
    <ul class="nav-links">
      <li><a href="home.html" class="nav-link">Home</a></li>
      <li><a href="report.html" class="nav-link">Report Item</a></li>
      <li><a href="browse.html" class="nav-link">Browse Items</a></li>
      <li><a href="my-items.html" class="nav-link">My Items</a></li>
      <li><a href="track.html" class="nav-link active">Track Request</a></li>
      <li><a href="how-it-works.html" class="nav-link">How It Works</a></li>
      <li><a href="about.html" class="nav-link">About</a></li>
    </ul>
    <button class="btn-login" onclick="window.location.href='login.html'">Login / Register</button>
  </nav>

  <!-- Track Request Section -->
  <section class="section">
    <h2 class="section-title"><i class="fas fa-magnifying-glass"></i> Track Your Item & Find Matches</h2>
    <div class="track-box">
      <input type="text" id="trackInput" placeholder="Enter your Tracking ID (e.g. LF-1001)" />
      <button class="btn btn-primary" onclick="trackItem()">Track Item</button>
    </div>
    <div id="trackResult" class="track-result hidden"></div>
  </section>

  <footer class="footer">
    <p>Build by College Students of Vishwakarma Institute of Technology,Pune</p>
  </footer>

  <script src="track.js"></script>
</body>
</html>
